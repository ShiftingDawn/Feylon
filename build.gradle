plugins {
    id "java"
    id "application"
}

application {
    mainClass = "com.shiftingdawn.stacklang.Main"
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation "org.junit.jupiter:junit-jupiter:5.7.1"
    testRuntimeOnly "org.junit.platform:junit-platform-launcher"
}

tasks.named("test", Test) {
    useJUnitPlatform()

    maxHeapSize = "1G"

    testLogging {
        events "passed"
    }
}